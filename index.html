<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>規則變變變</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: linear-gradient(160deg, #fff4e0 0%, #ffe8f0 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; user-select: none;
  }
  #app {
    width: 100%; max-width: 900px; height: 100vh; max-height: 100vh;
    display: flex; flex-direction: column; position: relative;
  }

  /* ===== 頂部規則條 ===== */
  #ruleBar {
    flex: 0 0 auto; margin: 14px auto 6px; padding: 12px 28px;
    border-radius: 999px; font-size: 26px; font-weight: 900;
    color: #fff; text-align: center; box-shadow: 0 6px 0 rgba(0,0,0,.12);
    transition: background .4s, transform .3s; letter-spacing: 2px;
  }
  #ruleBar.color { background: linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b,#69db7c,#4dabf7); }
  #ruleBar.shape { background: linear-gradient(90deg,#9775fa,#748ffc); }
  #ruleBar.pop { transform: scale(1.12); }

  /* ===== 進度點 ===== */
  #progress { flex: 0 0 auto; display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; }
  .pdot { width: 12px; height: 12px; border-radius: 50%; background: #ffffff; box-shadow: inset 0 0 0 2px #ffc9c9; }
  .pdot.done { background: #ff8787; box-shadow: none; }
  .pdot.now  { background: #ffd43b; box-shadow: 0 0 0 4px #fff3bf; }

  /* ===== 卡片區 ===== */
  #cardZone {
    flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
    position: relative; min-height: 0;
  }
  #card {
    width: 190px; height: 190px; border-radius: 32px; background: #fff;
    box-shadow: 0 14px 0 rgba(0,0,0,.10), 0 4px 18px rgba(0,0,0,.12);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .15s;
    border: 6px solid #fff;
  }
  #card:active { transform: scale(.96); }
  #card.selected { border-color: #ffd43b; transform: translateY(-10px) scale(1.04); }
  #card svg { width: 130px; height: 130px; }
  #card.fly { transition: transform .5s cubic-bezier(.5,-0.4,.6,1.3), opacity .5s; }
  #card.shake { animation: shake .4s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)}
    40%{transform:translateX(14px)} 60%{transform:translateX(-10px)} 80%{transform:translateX(10px)}
  }

  /* ===== 籃子區 ===== */
  #baskets {
    flex: 0 0 auto; display: flex; gap: 14px; justify-content: center;
    align-items: flex-end; padding: 10px 12px 22px; flex-wrap: wrap;
  }
  .basket {
    width: 120px; height: 120px; border-radius: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff; box-shadow: 0 8px 0 rgba(0,0,0,.10);
    transition: transform .15s; position: relative; overflow: hidden;
  }
  .basket:active { transform: scale(.95); }
  .basket svg { width: 78px; height: 78px; }
  .basket .swatch { width: 100%; height: 100%; }
  .basket.hint { animation: glow 1s ease-in-out infinite; }
  @keyframes glow {
    0%,100%{ box-shadow: 0 8px 0 rgba(0,0,0,.10), 0 0 0 0 rgba(255,212,59,.0);}
    50%{ box-shadow: 0 8px 0 rgba(0,0,0,.10), 0 0 26px 8px rgba(255,212,59,.9);}
  }

  /* ===== 角色 ===== */
  #char {
    position: absolute; bottom: 150px; right: 10px; width: 130px;
    pointer-events: none; opacity: 0; transform: translateY(20px);
    transition: opacity .4s, transform .4s; z-index: 30;
  }
  #char.show { opacity: 1; transform: translateY(0); }
  #char img { width: 100%; filter: drop-shadow(0 6px 8px rgba(0,0,0,.2)); }

  /* ===== 手指提示 ===== */
  #finger {
    position: fixed; font-size: 50px; z-index: 40; pointer-events: none;
    display: none; transition: top .3s, left .3s;
    animation: point 1s ease-in-out infinite;
    filter: drop-shadow(0 3px 3px rgba(0,0,0,.25));
  }
  @keyframes point { 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(-12px,0);} }

  /* ===== 開始畫面 ===== */
  #startScreen, #endScreen {
    position: absolute; inset: 0; z-index: 50;
    background: linear-gradient(160deg, #fff4e0 0%, #ffe8f0 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  #startScreen.hide, #endScreen.hide { display: none; }
  .bigTitle { font-size: 50px; font-weight: 900; color: #ff6b6b; letter-spacing: 4px;
    text-shadow: 0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.08); }
  .startChars { display: flex; gap: 10px; align-items: flex-end; }
  .startChars img { width: 130px; filter: drop-shadow(0 6px 8px rgba(0,0,0,.2)); }
  .bigBtn {
    padding: 20px 60px; font-size: 32px; font-weight: 900; color: #fff;
    background: linear-gradient(90deg,#ff8787,#ffa94d); border: none; border-radius: 999px;
    cursor: pointer; box-shadow: 0 8px 0 rgba(0,0,0,.15); letter-spacing: 4px;
  }
  .bigBtn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,.15); }
  #endTitle { font-size: 44px; font-weight: 900; color: #ff6b6b; text-align: center; line-height: 1.4; }

  @media (max-width: 600px) {
    .basket { width: 88px; height: 88px; }
    .basket svg { width: 58px; height: 58px; }
    #card { width: 150px; height: 150px; }
    #card svg { width: 100px; height: 100px; }
    #ruleBar { font-size: 21px; padding: 10px 20px; }
    .bigTitle { font-size: 38px; }
    #char { width: 100px; bottom: 130px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- 頂部規則條 -->
  <div id="ruleBar" class="color">現在按顏色分</div>

  <!-- 進度點 -->
  <div id="progress"></div>

  <!-- 卡片 -->
  <div id="cardZone">
    <div id="card"></div>
  </div>

  <!-- 籃子 -->
  <div id="baskets"></div>

  <!-- 角色 -->
  <div id="char"><img id="charImg" src="" alt=""></div>

  <!-- 開始畫面 -->
  <div id="startScreen">
    <div class="bigTitle">規則變變變</div>
    <div class="startChars">
      <img src="阿威、小晴 files/awei_happy.png" alt="阿威">
      <img src="阿威、小晴 files/xiaoqing_happy.png" alt="小晴">
    </div>
    <button class="bigBtn" id="startBtn">開始玩</button>
  </div>

  <!-- 結束畫面 -->
  <div id="endScreen" class="hide">
    <div class="startChars">
      <img src="阿威、小晴 files/awei_happy.png" alt="阿威">
      <img src="阿威、小晴 files/xiaoqing_happy.png" alt="小晴">
    </div>
    <div id="endTitle">全部分完囉！<br>你好厲害！</div>
    <button class="bigBtn" id="againBtn">再玩一次</button>
  </div>

</div>

<!-- 手指提示 -->
<div id="finger">👈</div>

<script>
/* =========================================================
   規則變變變  認知彈性
   圖片資料夾：阿威、小晴 files（與本檔同層）
   ========================================================= */

/* ---------- 語音：最單純 pattern，不加任何額外機制 ---------- */
function speak(text){
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-TW";
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  } catch(e){}
}

/* ---------- 素材 ---------- */
const IMG = "阿威、小晴 files/";
const CHARS = {
  awei_happy:  IMG+"awei_happy.png",
  awei_smile:  IMG+"awei_smile.png",
  awei_think:  IMG+"awei_think.png",
  xq_happy:    IMG+"xiaoqing_happy.png",
  xq_smile:    IMG+"xiaoqing_smile.png",
  xq_think:    IMG+"xiaoqing_think.png",
};

/* ---------- 顏色與形狀定義 ---------- */
const COLORS = {
  red:    { name:"紅色", hex:"#ff6b6b" },
  blue:   { name:"藍色", hex:"#4dabf7" },
  yellow: { name:"黃色", hex:"#ffd43b" },
};
// 形狀 svg path（用 currentColor 上色）
const SHAPES = {
  rabbit: { name:"兔子", svg:`<svg viewBox="0 0 100 100"><g fill="currentColor"><ellipse cx="35" cy="22" rx="9" ry="20"/><ellipse cx="65" cy="22" rx="9" ry="20"/><circle cx="50" cy="62" r="30"/></g></svg>` },
  cat:    { name:"貓咪", svg:`<svg viewBox="0 0 100 100"><g fill="currentColor"><polygon points="22,20 38,45 12,45"/><polygon points="78,20 88,45 62,45"/><circle cx="50" cy="58" r="32"/></g></svg>` },
  star:   { name:"星星", svg:`<svg viewBox="0 0 100 100"><polygon fill="currentColor" points="50,6 62,38 96,38 68,58 79,92 50,71 21,92 32,58 4,38 38,38"/></svg>` },
  heart:  { name:"愛心", svg:`<svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 86 C 12 56, 8 28, 30 20 C 42 16, 50 28, 50 34 C 50 28, 58 16, 70 20 C 92 28, 88 56, 50 86 Z"/></svg>` },
};

/* ---------- 每層的卡池與籃子配置 ---------- */
const COLOR_KEYS = ["red","blue","yellow"];
const SHAPE_KEYS = ["rabbit","cat","star","heart"];

const LEVELS = [
  { colors:["red","blue"],            shapes:["rabbit","cat"] },              // 2×2
  { colors:["red","blue","yellow"],   shapes:["rabbit","cat","star"] },       // 3×3
  { colors:["red","blue","yellow"],   shapes:["rabbit","cat","star","heart"]},// 3×4
];

/* ---------- 15 題腳本：每層 5 題，rule=color/shape，hint=是否提示題 ---------- */
// 規則安排讓每層內都有來回切換
const PLAN = [
  // 第 1 層 2×2
  {lv:0, rule:"color", hint:true },
  {lv:0, rule:"color", hint:false},
  {lv:0, rule:"shape", hint:true },
  {lv:0, rule:"shape", hint:false},
  {lv:0, rule:"color", hint:true },
  // 第 2 層 3×3
  {lv:1, rule:"color", hint:false},
  {lv:1, rule:"shape", hint:true },
  {lv:1, rule:"shape", hint:false},
  {lv:1, rule:"color", hint:true },
  {lv:1, rule:"color", hint:false},
  // 第 3 層 3×4
  {lv:2, rule:"shape", hint:true },
  {lv:2, rule:"shape", hint:false},
  {lv:2, rule:"color", hint:true },
  {lv:2, rule:"color", hint:false},
  {lv:2, rule:"shape", hint:true },
];

/* ---------- 狀態 ---------- */
let qIndex = 0;          // 目前第幾題（0~14）
let current = null;      // 目前卡片 { color, shape }
let selected = false;    // 卡片是否被選取
let curRule = "color";
let curLevel = 0;
let lastRule = null;     // 上一題的規則，用來判斷是否剛切換

/* ---------- DOM ---------- */
const ruleBar = document.getElementById("ruleBar");
const cardEl  = document.getElementById("card");
const basketsEl = document.getElementById("baskets");
const progressEl = document.getElementById("progress");
const charBox = document.getElementById("char");
const charImg = document.getElementById("charImg");
const finger  = document.getElementById("finger");

/* ---------- 進度點 ---------- */
function buildProgress(){
  progressEl.innerHTML = "";
  for(let i=0;i<PLAN.length;i++){
    const d = document.createElement("div");
    d.className = "pdot";
    progressEl.appendChild(d);
  }
}
function refreshProgress(){
  [...progressEl.children].forEach((d,i)=>{
    d.className = "pdot" + (i<qIndex ? " done" : i===qIndex ? " now" : "");
  });
}

/* ---------- 顯示角色 ---------- */
function showChar(key, ms=2600){
  charImg.src = CHARS[key];
  charBox.classList.add("show");
  clearTimeout(showChar._t);
  showChar._t = setTimeout(()=>charBox.classList.remove("show"), ms);
}

/* ---------- 隨機工具 ---------- */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ---------- 出題 ---------- */
function nextQuestion(){
  if(qIndex >= PLAN.length){ endGame(); return; }
  const step = PLAN[qIndex];
  curLevel = step.lv;
  curRule = step.rule;
  const lv = LEVELS[curLevel];

  // 產生一張卡：顏色、形狀都從本層卡池隨機取
  current = { color: pick(lv.colors), shape: pick(lv.shapes) };
  selected = false;

  // 規則條
  ruleBar.className = curRule;
  ruleBar.textContent = curRule==="color" ? "現在按顏色分" : "現在按形狀分";

  // 規則若和上一題不同 → 規則切換：角色宣布 + 規則條彈一下
  const switched = (lastRule !== null && lastRule !== curRule);
  if(switched){
    ruleBar.classList.add("pop");
    setTimeout(()=>ruleBar.classList.remove("pop"), 320);
    const who = pick(["awei_think","xq_think"]);
    showChar(who);
    speak(curRule==="color" ? "規則變囉！現在我們要按顏色來分！" : "規則變囉！現在我們要按形狀來分！");
  }
  lastRule = curRule;

  // 畫卡片
  renderCard();
  // 畫籃子（跟著規則換）
  renderBaskets(lv);
  refreshProgress();

  // 提示題：對應正確籃子發光 + 手指指卡片
  if(step.hint){
    setTimeout(()=>highlightCorrectBasket(), switched ? 1400 : 400);
  }
  // 手指先指卡片，提示「點我」
  pointFinger(cardEl);

  if(!switched){
    // 沒切換時也給一句操作引導語（簡短）
    setTimeout(()=>{
      speak(curRule==="color" ? "看看它是什麼顏色？" : "看看它是什麼形狀？");
    }, 250);
  }
}

/* ---------- 畫卡片 ---------- */
function renderCard(){
  const colorHex = COLORS[current.color].hex;
  const shapeSvg = SHAPES[current.shape].svg;
  cardEl.className = "";
  cardEl.style.color = colorHex;          // svg 用 currentColor → 同時帶出顏色與形狀
  cardEl.innerHTML = shapeSvg;
  cardEl.style.transform = "";
  cardEl.style.opacity = "1";
}

/* ---------- 畫籃子 ---------- */
function renderBaskets(lv){
  basketsEl.innerHTML = "";
  const keys = curRule==="color" ? lv.colors : lv.shapes;
  keys.forEach(k=>{
    const b = document.createElement("div");
    b.className = "basket";
    b.dataset.key = k;
    if(curRule==="color"){
      const sw = document.createElement("div");
      sw.className = "swatch";
      sw.style.background = COLORS[k].hex;
      b.appendChild(sw);
    } else {
      b.innerHTML = SHAPES[k].svg;
      b.style.color = "#868e96";          // 形狀籃子用灰色輪廓，不暗示顏色
    }
    b.addEventListener("click", ()=>onBasket(k, b));
    basketsEl.appendChild(b);
  });
}

/* ---------- 正確籃子發光（提示題） ---------- */
function highlightCorrectBasket(){
  const correct = curRule==="color" ? current.color : current.shape;
  [...basketsEl.children].forEach(b=>{
    if(b.dataset.key === correct){
      b.classList.add("hint");
      pointFinger(b);
    }
  });
}

/* ---------- 點卡片 ---------- */
cardEl.addEventListener("click", ()=>{
  if(qIndex >= PLAN.length) return;
  selected = !selected;
  cardEl.classList.toggle("selected", selected);
  if(selected){
    // 選了卡片 → 手指改指籃子群
    pointFinger(basketsEl);
  } else {
    pointFinger(cardEl);
  }
});

/* ---------- 點籃子 ---------- */
function onBasket(key, basketEl){
  if(qIndex >= PLAN.length) return;
  if(!selected){
    // 還沒選卡片，先提醒點卡片
    speak("先點一下卡片喔！");
    pointFinger(cardEl);
    return;
  }
  const correct = curRule==="color" ? current.color : current.shape;
  if(key === correct){
    // 答對：卡片飛進籃子
    finger.style.display = "none";
    clearHints();
    const rect = basketEl.getBoundingClientRect();
    const crect = cardEl.getBoundingClientRect();
    cardEl.classList.add("fly");
    cardEl.style.transform =
      `translate(${rect.left+rect.width/2 - (crect.left+crect.width/2)}px,
                 ${rect.top+rect.height/2 - (crect.top+crect.height/2)}px) scale(.3)`;
    cardEl.style.opacity = "0";
    cardEl.classList.remove("selected");
    selected = false;
    speak(pick(["答對了！","好棒！","你做到了！","太厲害了！"]));
    qIndex++;
    setTimeout(nextQuestion, 850);
  } else {
    // 答錯：卡片彈一下 + 具體支架語，不責備
    cardEl.classList.add("shake");
    setTimeout(()=>cardEl.classList.remove("shake"), 420);
    const hint = curRule==="color"
      ? "現在是按顏色分喔，找一樣的顏色！"
      : "現在是按形狀分喔，找一樣的圖案！";
    speak(hint);
  }
}

/* ---------- 清掉提示 ---------- */
function clearHints(){
  [...basketsEl.children].forEach(b=>b.classList.remove("hint"));
}

/* ---------- 手指提示（fixed 浮層 + getBoundingClientRect） ---------- */
function pointFinger(targetEl){
  if(!targetEl) { finger.style.display="none"; return; }
  const r = targetEl.getBoundingClientRect();
  finger.style.display = "block";
  finger.style.top  = (r.top + r.height/2 - 25) + "px";
  finger.style.left = (r.right + 6) + "px";
}

/* ---------- 結束 ---------- */
function endGame(){
  finger.style.display = "none";
  charBox.classList.remove("show");
  document.getElementById("endScreen").classList.remove("hide");
  speak("全部分完囉！你好厲害！");
}

/* ---------- 開始 ---------- */
function startGame(){
  qIndex = 0; lastRule = null; selected = false;
  document.getElementById("startScreen").classList.add("hide");
  document.getElementById("endScreen").classList.add("hide");
  buildProgress();
  // 開場角色打招呼
  showChar("awei_smile", 2200);
  speak("我們來玩分類遊戲！先看看上面的規則喔！");
  setTimeout(nextQuestion, 900);
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("againBtn").addEventListener("click", startGame);

/* 視窗縮放時，手指若顯示中就重新定位（避免跑位） */
window.addEventListener("resize", ()=>{
  if(finger.style.display==="block" && selected) pointFinger(basketsEl);
});
</script>
</body>
</html>
